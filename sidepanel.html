<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agentic</title>
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface2: #0b1220;
      --primary: #38bdf8;
      --primary-dim: rgba(56,189,248,0.12);
      --text: #e2e8f0;
      --muted: #64748b;
      --border: rgba(255,255,255,0.07);
      --danger: #ef4444;
      --success: #22c55e;
      --warning: #f59e0b;
      --tool-bg: rgba(56,189,248,0.06);
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      font-size: 13px;
    }

    /* ── Header ── */
    header {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .header-title { font-size: 13px; font-weight: 600; letter-spacing: 0.2px; flex: 1; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
    .status-dot.ok { background: var(--success); }

    /* Pinned tab badge */
    .pinned-tab {
      display: none;
      align-items: center;
      gap: 5px;
      background: var(--surface2);
      border: 1px solid rgba(34,197,94,0.25);
      border-radius: 8px;
      padding: 3px 8px;
      font-size: 11px;
      color: var(--success);
      max-width: 180px;
      overflow: hidden;
    }
    .pinned-tab.visible { display: flex; }
    .pinned-tab .pin-icon { font-size: 10px; flex-shrink: 0; }
    .pinned-tab .pin-label {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--muted);
      font-weight: 500;
    }

    /* Mode toggle */
    .mode-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 4px 8px;
      cursor: pointer;
      user-select: none;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      transition: all 0.2s;
    }
    .mode-toggle:hover { border-color: var(--primary); }
    .mode-toggle.free { color: var(--warning); border-color: rgba(245,158,11,0.4); }
    .mode-toggle .mode-icon { font-size: 13px; }

    .icon-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      font-size: 15px;
      line-height: 1;
      transition: color 0.15s;
    }
    .icon-btn:hover { color: var(--text); }

    /* ── Chat area ── */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 14px 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scroll-behavior: smooth;
    }
    .chat-area::-webkit-scrollbar { width: 4px; }
    .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* Messages */
    .msg { display: flex; flex-direction: column; gap: 4px; max-width: 92%; }
    .msg.user { align-self: flex-end; }
    .msg.assistant { align-self: flex-start; }

    .msg-bubble {
      padding: 9px 12px;
      border-radius: var(--radius);
      line-height: 1.5;
      word-break: break-word;
    }
    .msg.user .msg-bubble { background: #0d3b66; border-bottom-right-radius: 4px; }
    .msg.assistant .msg-bubble {
      background: var(--surface);
      border-bottom-left-radius: 4px;
    }

    /* Markdown inside assistant bubble */
    .msg-bubble p { margin-bottom: 6px; }
    .msg-bubble p:last-child { margin-bottom: 0; }
    .msg-bubble strong { font-weight: 700; color: #f0f9ff; }
    .msg-bubble em { font-style: italic; color: #bae6fd; }
    .msg-bubble code {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      background: rgba(0,0,0,0.35);
      padding: 1px 5px;
      border-radius: 4px;
      font-size: 12px;
    }
    .msg-bubble pre {
      background: rgba(0,0,0,0.35);
      border-radius: 8px;
      padding: 10px 12px;
      overflow-x: auto;
      margin: 6px 0;
    }
    .msg-bubble pre code { background: none; padding: 0; font-size: 12px; }
    .msg-bubble ul, .msg-bubble ol { padding-left: 18px; margin: 4px 0; }
    .msg-bubble li { margin-bottom: 2px; }
    .msg-bubble h1, .msg-bubble h2, .msg-bubble h3 { color: #f0f9ff; margin-bottom: 4px; }
    .msg-bubble h1 { font-size: 15px; }
    .msg-bubble h2 { font-size: 14px; }
    .msg-bubble h3 { font-size: 13px; }
    .msg-bubble a { color: var(--primary); text-decoration: none; }
    .msg-bubble a:hover { text-decoration: underline; }

    /* Thinking indicator */
    .thinking {
      align-self: flex-start;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      padding: 6px 0;
    }
    .thinking-dots { display: flex; gap: 4px; }
    .thinking-dots span {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--muted);
      animation: pulse 1.2s infinite;
    }
    .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
    .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse { 0%,80%,100%{opacity:0.3;transform:scale(0.8)} 40%{opacity:1;transform:scale(1)} }

    /* Approval cards */
    .approval-card {
      align-self: flex-start;
      background: var(--surface2);
      border: 1px solid rgba(245,158,11,0.3);
      border-radius: var(--radius);
      padding: 10px 12px;
      max-width: 95%;
    }
    .approval-card .approval-title { font-weight: 600; color: var(--warning); font-size: 12px; margin-bottom: 6px; }
    .approval-card .approval-detail {
      font-family: ui-monospace, monospace;
      font-size: 11px;
      color: var(--muted);
      background: rgba(0,0,0,0.2);
      border-radius: 6px;
      padding: 6px 8px;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 80px;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .approval-actions { display: flex; gap: 6px; }
    .approval-actions button {
      flex: 1; padding: 7px; border: none; border-radius: 8px;
      font-size: 12px; font-weight: 600; cursor: pointer;
    }
    .btn-approve { background: var(--success); color: #052e16; }
    .btn-reject  { background: var(--danger);  color: #450a0a; }

    /* Error */
    .msg-error {
      align-self: flex-start;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: 8px;
      padding: 8px 12px;
      color: #fca5a5;
      font-size: 12px;
      max-width: 95%;
    }

    /* Thinking block */
    .thinking-block {
      align-self: flex-start;
      background: rgba(56,189,248,0.04);
      border: 1px solid rgba(56,189,248,0.15);
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 11px;
      color: var(--muted);
      max-width: 95%;
    }
    .thinking-block summary {
      cursor: pointer;
      font-weight: 600;
      color: var(--primary);
      user-select: none;
      list-style: none;
    }
    .thinking-block summary::before { content: '▶ '; font-size: 9px; }
    .thinking-block[open] summary::before { content: '▼ '; }
    .thinking-block pre {
      white-space: pre-wrap;
      word-break: break-word;
      font-family: ui-monospace, monospace;
      margin-top: 6px;
      max-height: 200px;
      overflow-y: auto;
      line-height: 1.5;
    }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--border);
      background: var(--surface);
      padding: 10px;
      display: flex;
      gap: 8px;
      align-items: flex-end;
      flex-shrink: 0;
    }
    footer textarea {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      padding: 8px 10px;
      resize: none;
      min-height: 38px;
      max-height: 140px;
      overflow-y: auto;
      outline: none;
      transition: border-color 0.2s;
      line-height: 1.4;
    }
    footer textarea:focus { border-color: var(--primary); }
    footer textarea::placeholder { color: var(--muted); }
    .send-btn {
      background: var(--primary);
      border: none;
      border-radius: 10px;
      color: #06202a;
      font-weight: 700;
      font-size: 13px;
      padding: 8px 14px;
      cursor: pointer;
      transition: opacity 0.2s;
      white-space: nowrap;
    }
    .send-btn:hover { opacity: 0.9; }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .stop-btn {
      background: #7f1d1d;
      border: 1px solid #ef4444;
      border-radius: 10px;
      color: #fca5a5;
      font-weight: 700;
      font-size: 13px;
      padding: 8px 14px;
      cursor: pointer;
      display: none;
      align-items: center;
      gap: 5px;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .stop-btn:hover { background: #991b1b; }
    .stop-btn.visible { display: flex; }
  </style>
</head>
<body>
  <header>
    <div class="status-dot" id="statusDot"></div>
    <span class="header-title">Agentic</span>
    <div class="pinned-tab" id="pinnedTab" title="Aba onde o agente está operando">
      <span class="pin-icon">📌</span>
      <span class="pin-label" id="pinnedTabLabel">--</span>
    </div>
    <div class="mode-toggle" id="modeToggle" title="Alternar modo de permissão">
      <span class="mode-icon" id="modeIcon">🔒</span>
      <span id="modeLabel">Pedir aprovação</span>
    </div>
    <button class="icon-btn" id="reloadBtn" title="Recarregar extensão">↺</button>
    <button class="icon-btn" id="clearBtn" title="Limpar conversa">🗑</button>
    <button class="icon-btn" id="settingsBtn" title="Configurações">⚙️</button>
  </header>

  <div class="chat-area" id="chatArea"></div>

  <footer>
    <textarea id="input" placeholder="Digite uma mensagem..." rows="1"></textarea>
    <button class="stop-btn" id="stopBtn">⏹ Parar</button>
    <button class="send-btn" id="sendBtn">Enviar</button>
  </footer>

  <script src="utils.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
